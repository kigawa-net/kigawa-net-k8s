apiVersion: batch/v1
kind: Job
metadata:
  name: sentry-setup-nextcloud
  namespace: kigawa-net-sentry
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sentry-setup-sa
      initContainers:
        - name: wait-for-web
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - |
              until wget -qO- http://sentry-web:9000/_health/ 2>/dev/null | grep -q ok; do
                echo "waiting for sentry-web..."; sleep 5
              done
      containers:
        - name: setup
          image: ghcr.io/getsentry/sentry:26.5.0
          env:
            - name: SENTRY_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sentry-sec
                  key: system-secret-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentry-sentry-postgresql
                  key: postgres-password
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_NAME
              value: sentry
            - name: POSTGRES_HOST
              value: sentry-sentry-postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: SNUBA
              value: http://sentry-snuba:1218
            - name: VROOM
              value: http://sentry-vroom:8085
          volumeMounts:
            - name: config
              mountPath: /etc/sentry
            - name: sentry-data
              mountPath: /data
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              DSN=$(sentry django shell -c "
              from sentry.models.organization import Organization
              from sentry.models.team import Team
              from sentry.models.project import Project
              from sentry.models.projectkey import ProjectKey

              org = Organization.objects.get()
              team, _ = Team.objects.get_or_create(
                  organization=org,
                  slug='kigawa-net',
                  defaults={'name': 'kigawa-net'}
              )
              project, created = Project.objects.get_or_create(
                  organization=org,
                  slug='nextcloud',
                  defaults={'name': 'Nextcloud', 'platform': 'php-other'}
              )
              if created:
                  project.add_team(team)
              key = ProjectKey.objects.filter(project=project).first()
              if not key:
                  key = ProjectKey.objects.create(project=project)
              print(key.get_dsn())
              " 2>/dev/null)

              echo "DSN: $DSN"

              kubectl create secret generic nextcloud-sentry-sec \
                --from-literal=dsn="$DSN" \
                --dry-run=client -o yaml \
                -n kigawa-net-nextcloud \
                | kubectl apply -n kigawa-net-nextcloud -f -

              echo "Secret nextcloud-sentry-sec created/updated in kigawa-net-nextcloud"
      volumes:
        - name: config
          configMap:
            name: sentry-sentry
        - name: sentry-data
          persistentVolumeClaim:
            claimName: sentry-data
