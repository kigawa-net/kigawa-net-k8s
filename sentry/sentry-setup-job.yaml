apiVersion: batch/v1
kind: Job
metadata:
  name: sentry-setup-nextcloud
  namespace: kigawa-net-sentry
spec:
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sentry-setup-sa
      volumes:
        - name: shared
          emptyDir: {}
      initContainers:
        - name: get-dsn
          image: bitnami/kubectl:latest
          volumeMounts:
            - name: shared
              mountPath: /shared
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              POD=$(kubectl get pod -n kigawa-net-sentry -l app.kubernetes.io/name=sentry,app.kubernetes.io/component=web -o jsonpath='{.items[0].metadata.name}')
              echo "Using sentry-web pod: $POD"
              kubectl exec -n kigawa-net-sentry "$POD" -- sentry django shell -c "
              from sentry.models.organization import Organization
              from sentry.models.team import Team
              from sentry.models.project import Project
              from sentry.models.projectkey import ProjectKey

              org = Organization.objects.get()
              team, _ = Team.objects.get_or_create(organization=org, slug='kigawa-net', defaults={'name': 'kigawa-net'})
              project, created = Project.objects.get_or_create(organization=org, slug='nextcloud', defaults={'name': 'Nextcloud', 'platform': 'php-other'})
              if created:
                  project.add_team(team)
              key = ProjectKey.objects.filter(project=project).first()
              if not key:
                  key = ProjectKey.objects.create(project=project)
              print(key.get_dsn())
              " 2>/dev/null | grep "^https://" > /shared/dsn
              echo "DSN written: $(cat /shared/dsn)"
      containers:
        - name: create-secret
          image: bitnami/kubectl:latest
          volumeMounts:
            - name: shared
              mountPath: /shared
          command:
            - bash
            - -euo
            - pipefail
            - -c
            - |
              DSN=$(cat /shared/dsn)
              echo "Creating secret with DSN: $DSN"
              kubectl create secret generic nextcloud-sentry-sec \
                --from-literal=dsn="$DSN" \
                --dry-run=client -o yaml \
                -n kigawa-net-nextcloud \
                | kubectl apply -n kigawa-net-nextcloud -f -
              echo "Secret nextcloud-sentry-sec created/updated"
