apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: kigawa-net-sentry
data:
  settings.xml: |
    <clickhouse>
      <profiles>
        <default>
          <max_parser_backtracks>100000</max_parser_backtracks>
          <allow_experimental_json_type>1</allow_experimental_json_type>
        </default>
      </profiles>
    </clickhouse>
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: kigawa-net-sentry
spec:
  clusterIP: None
  selector:
    app: clickhouse
  ports:
    - name: tcp
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: kigawa-net-sentry
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:25.1
          ports:
            - containerPort: 9000
              name: tcp
            - containerPort: 8123
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/users.d
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: rook-ceph-rbd
        resources:
          requests:
            storage: 50Gi
