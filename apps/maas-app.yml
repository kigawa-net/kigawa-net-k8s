apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-maas-app
  namespace: argocd
spec:
  project: kigawa-net

  source:
    repoURL: https://github.com/kigawa-net/kigawa-net-k8s.git
    targetRevision: main
    path: maas
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-maas

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true