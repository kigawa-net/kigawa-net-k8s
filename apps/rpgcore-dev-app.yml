apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-mc-rpgcore-dev
  namespace: argocd
spec:
  project: one

  source:
    repoURL: https://github.com/OneServerMC/RpgCore.git
    targetRevision: develop
    path: k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-mc-rpgcore

  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
