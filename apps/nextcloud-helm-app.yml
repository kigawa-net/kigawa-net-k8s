apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-nextcloud-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://nextcloud.github.io/helm/
    chart: nextcloud
    targetRevision: 9.0.3
    helm:
      releaseName: nextcloud
      valuesObject:
        nextcloud:
          host: nextcloud.kigawa.net
          existingSecret:
            enabled: true
            secretName: nextcloud-sec
            usernameKey: username
            passwordKey: password
          configs:
            trusted_domains.config.php: |-
              <?php
              $CONFIG = [
                'trusted_domains' => [
                  'localhost',
                  'nextcloud.kigawa.net',
                ],
              ];
            sentry.config.php: |-
              <?php
              $CONFIG = [
                'sentry.dsn' => getenv('SENTRY_DSN'),
                'sentry.minimum.log.level' => 2,
              ];

          extraEnv:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: nextcloud-sentry-sec
                  key: dsn

          extraVolumes:
            - name: cephfs-root
              persistentVolumeClaim:
                claimName: rook-cephfs-root

          extraVolumeMounts:
            - name: cephfs-root
              mountPath: /mnt/cephfs

          extraInitContainers:
            - name: fix-config-permissions
              image: busybox
              command:
                - sh
                - -c
                - chown www-data:www-data /var/www/html/config
              securityContext:
                runAsUser: 0
              volumeMounts:
                - name: nextcloud-main
                  mountPath: /var/www/html

          podSecurityContext:
            fsGroup: 33
            fsGroupChangePolicy: "OnRootMismatch"

        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0

        resources:
          requests:
            memory: 512Mi
          limits:
            memory: 1Gi

        livenessProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 40

        readinessProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 128

        startupProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 600

        ingress:
          enabled: true
          className: haproxy
          hosts:
            - host: nextcloud.kigawa.net
              paths:
                - path: /
                  pathType: Prefix

        persistence:
          enabled: true
          storageClass: rook-cephfs
          accessMode: ReadWriteMany
          size: 64Gi

        mariadb:
          enabled: true
          auth:
            database: nextcloud
            username: nextcloud
            existingSecret: nextcloud-mariadb-sec
          primary:
            persistence:
              enabled: true
              storageClass: rook-cephfs
              size: 8Gi
            startupProbe:
              enabled: true
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 40
            livenessProbe:
              enabled: true
              initialDelaySeconds: 300
              periodSeconds: 20
              failureThreshold: 10
        internalDatabase:
          enabled: false
        externalDatabase:
          enabled: false
          existingSecret:
            enabled: true
            secretName: nextcloud-mariadb-sec
            usernameKey: username
            passwordKey: mariadb-password

        cronjob:
          enabled: true
          type: cronjob
          cronjob:
            schedule: "*/5 * * * *"
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 3
            backoffLimit: 1
            securityContext:
              runAsUser: 33
              runAsGroup: 33


  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-nextcloud

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: nextcloud-db
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true