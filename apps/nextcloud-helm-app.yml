apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-nextcloud-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://nextcloud.github.io/helm/
    chart: nextcloud
    targetRevision: 9.0.3
    helm:
      releaseName: nextcloud
      valuesObject:
        nextcloud:
          host: nextcloud.kigawa.net
          existingSecret:
            enabled: true
            secretName: nextcloud-sec
            usernameKey: username
            passwordKey: password
          configs:
            trusted_domains.config.php: |-
              <?php
              $CONFIG = [
                'trusted_domains' => [
                  'localhost',
                  'nextcloud.kigawa.net',
                ],
              ];

        livenessProbe:
          enabled: true
          initialDelaySeconds: 300
          periodSeconds: 15
          failureThreshold: 10

        readinessProbe:
          enabled: true
          initialDelaySeconds: 300
          periodSeconds: 15
          failureThreshold: 10

        startupProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 40

        ingress:
          enabled: true
          className: haproxy
          hosts:
            - host: nextcloud.kigawa.net
              paths:
                - path: /
                  pathType: Prefix

        persistence:
          enabled: true
          storageClass: rook-cephfs
          accessMode: ReadWriteMany
          size: 64Gi

        mariadb:
          enabled: true
          auth:
            database: nextcloud
            username: nextcloud
            existingSecret: nextcloud-mariadb-sec
          primary:
            persistence:
              enabled: true
              storageClass: rook-cephfs
              size: 8Gi
            startupProbe:
              enabled: true
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 40
            livenessProbe:
              enabled: true
              initialDelaySeconds: 300
              periodSeconds: 20
              failureThreshold: 10
        internalDatabase:
          enabled: false
        externalDatabase:
          enabled: false
          existingSecret:
            enabled: true
            secretName: nextcloud-mariadb-sec
            usernameKey: username
            passwordKey: mariadb-password


  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-nextcloud

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: nextcloud-db
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true