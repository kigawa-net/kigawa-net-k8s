apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-nextcloud-helm
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://nextcloud.github.io/helm/
    chart: nextcloud
    targetRevision: 9.0.3
    helm:
      releaseName: nextcloud
      valuesObject:
        nextcloud:
          host: nextcloud.kigawa.net
          existingSecret:
            enabled: true
            secretName: nextcloud-sec
            usernameKey: username
            passwordKey: password
          configs:
            trusted_domains.config.php: |-
              <?php
              $CONFIG = [
                'trusted_domains' => [
                  'localhost',
                  'nextcloud.kigawa.net',
                ],
              ];
            sentry.config.php: |-
              <?php
              $CONFIG = [
                'sentry.dsn' => getenv('SENTRY_DSN'),
                'sentry.minimum.log.level' => 2,
              ];
            performance.config.php: |-
              <?php
              $CONFIG = [
                'memcache.local' => '\OC\Memcache\APCu',
                'memcache.distributed' => '\OC\Memcache\Redis',
                'memcache.locking' => '\OC\Memcache\Redis',
                'redis' => [
                  'host' => 'nextcloud-redis-master',
                  'port' => 6379,
                  'timeout' => 1.5,
                  'read_timeout' => 1.5,
                  'dbindex' => 0,
                ],
                'default_phone_region' => 'JP',
                'maintenance_window_start' => 1,
                'enable_previews' => true,
                'enabledPreviewProviders' => [
                  'OC\Preview\Movie',
                  'OC\Preview\PNG',
                  'OC\Preview\JPEG',
                  'OC\Preview\GIF',
                  'OC\Preview\BMP',
                  'OC\Preview\XBitmap',
                  'OC\Preview\MP3',
                  'OC\Preview\MP4',
                  'OC\Preview\TXT',
                  'OC\Preview\MarkDown',
                  'OC\Preview\PDF',
                ],
              ];

          extraEnv:
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: nextcloud-sentry-sec
                  key: dsn

          extraVolumes:
            - name: cephfs-root
              persistentVolumeClaim:
                claimName: rook-cephfs-root

          extraVolumeMounts:
            - name: cephfs-root
              mountPath: /mnt/cephfs

          extraInitContainers:
            - name: fix-config-permissions
              image: busybox
              command:
                - sh
                - -c
                - chown www-data:www-data /var/www/html/config
              securityContext:
                runAsUser: 0
              volumeMounts:
                - name: nextcloud-main
                  mountPath: /var/www/html

          phpConfigs:
            opcache.ini: |-
              opcache.enable=1
              opcache.enable_cli=1
              opcache.interned_strings_buffer=32
              opcache.max_accelerated_files=10000
              opcache.memory_consumption=256
              opcache.save_comments=1
              opcache.revalidate_freq=60
              opcache.jit=1255
              opcache.jit_buffer_size=128M
            www.conf: |-
              [www]
              pm = dynamic
              pm.max_children = 20
              pm.start_servers = 5
              pm.min_spare_servers = 3
              pm.max_spare_servers = 10
              pm.max_requests = 500

          podSecurityContext:
            fsGroup: 33
            fsGroupChangePolicy: "OnRootMismatch"

        replicaCount: 2

        podDisruptionBudget:
          enabled: true
          minAvailable: 1

        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0

        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 2Gi
            cpu: 2000m

        livenessProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 40
          timeoutSeconds: 10

        readinessProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 128
          timeoutSeconds: 10

        startupProbe:
          enabled: true
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 600

        ingress:
          enabled: true
          className: haproxy
          hosts:
            - host: nextcloud.kigawa.net
              paths:
                - path: /
                  pathType: Prefix

        persistence:
          enabled: true
          storageClass: rook-cephfs
          accessMode: ReadWriteMany
          size: 64Gi

        mariadb:
          enabled: true
          auth:
            database: nextcloud
            username: nextcloud
            existingSecret: nextcloud-mariadb-sec
          primary:
            persistence:
              enabled: true
              storageClass: rook-cephfs
              size: 8Gi
            extraFlags: >-
              --innodb-buffer-pool-size=512M
              --innodb-log-file-size=128M
              --innodb-flush-log-at-trx-commit=2
              --max-connections=150
              --tmp-table-size=64M
              --max-heap-table-size=64M
              --join-buffer-size=4M
              --sort-buffer-size=4M
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 1Gi
                cpu: 1000m
            startupProbe:
              enabled: true
              initialDelaySeconds: 120
              periodSeconds: 15
              failureThreshold: 40
            livenessProbe:
              enabled: true
              initialDelaySeconds: 300
              periodSeconds: 20
              failureThreshold: 10
        internalDatabase:
          enabled: false
        externalDatabase:
          enabled: false
          existingSecret:
            enabled: true
            secretName: nextcloud-mariadb-sec
            usernameKey: username
            passwordKey: mariadb-password

        redis:
          enabled: true
          architecture: standalone
          auth:
            enabled: false
          master:
            persistence:
              enabled: false
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 256Mi
                cpu: 500m

        cronjob:
          enabled: true
          type: cronjob
          cronjob:
            schedule: "*/5 * * * *"
            successfulJobsHistoryLimit: 3
            failedJobsHistoryLimit: 3
            backoffLimit: 1
            securityContext:
              runAsUser: 33
              runAsGroup: 33


  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-nextcloud

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: nextcloud-db
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true