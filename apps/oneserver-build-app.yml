apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oneserver-build
  namespace: argocd
spec:
  project: one

  source:
    repoURL: https://github.com/OneServerMC/k8s.git
    targetRevision: main
    path: manifest/build

  destination:
    server: https://kubernetes.default.svc
    namespace: onemc-build

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
