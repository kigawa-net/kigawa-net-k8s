apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-app
  namespace: argocd
spec:
  project: default

  source:
    # GitHub リポジトリ URL
    repoURL: https://github.com/kigawa-net/kigawa-net-k8s.git
    targetRevision: main

    # Kubernetes manifests のルートパス
    # 例: /deploy や /k8s などあればここを書き換える
    path: apps
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    # デプロイ先 namespace
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kigawa-net
  namespace: argocd
spec:
  description: Project for kigawa.net Kubernetes resources

  # ----------------------------
  # デプロイ先の制限
  # ----------------------------
  destinations:
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: kigawa-net
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: kigawa-net-*
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: gpu-operator
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: sm-operator-system
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: tidb-system
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: onemc-rpgcore
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: arc-systems
    - name: in-cluster
      server: https://kubernetes.default.svc
      namespace: arc-runners

  # ----------------------------
  # 許可する Git リポジトリ
  # ----------------------------
  sourceRepos:
    - https://github.com/kigawa-net/*
    - https://ray-project.github.io/kuberay-helm/
    - https://helm.ngc.nvidia.com/nvidia
    - oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
    - oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set

  # ----------------------------
  # Namespace リソース許可
  # ----------------------------
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # ----------------------------
  # Cluster スコープ リソース許可
  # （IngressClass, CRD, ClusterRole など）
  # ----------------------------
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
