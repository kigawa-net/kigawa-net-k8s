apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oneserver-dev
  namespace: argocd
spec:
  project: one

  source:
    repoURL: https://github.com/OneServerMC/RpgCore.git
    targetRevision: develop
    path: k8s/one/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: onemc-rpgcore-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
