apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runners-onemc
  namespace: argocd
spec:
  project: kigawa-net

  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      releaseName: arc-runner-set
      valuesObject:
        githubConfigUrl: "https://github.com/OneServerMC"
        githubConfigSecret: arc-github-secret
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-gha-rs-controller
        containerMode:
          type: dind
        minRunners: 0
        maxRunners: 5
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:2.334.0
                resources:
                  requests:
                    memory: "2Gi"
                    cpu: "1"
                    ephemeral-storage: "20Gi"
                  limits:
                    memory: "8Gi"
                    cpu: "4"
                    ephemeral-storage: "40Gi"
              - name: dind
                args:
                  - dockerd
                  - --host=unix:///var/run/docker.sock
                  - --iptables=false
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "6Gi"
                    cpu: "2"

  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners

  syncPolicy:
    automated:
      prune: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
