apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-mcp
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/kigawa-net/kigawa-net-k8s.git
    targetRevision: main
    path: argocd-mcp
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
