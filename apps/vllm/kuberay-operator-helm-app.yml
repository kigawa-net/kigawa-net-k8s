apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kuberay-operator
  namespace: argocd
spec:
  project: kigawa-net

  source:
    repoURL: https://ray-project.github.io/kuberay-helm/
    chart: kuberay-operator
    targetRevision: 1.2.1
    helm:
      releaseName: kuberay-operator
      valuesObject:
        image:
          repository: kuberay/operator
          tag: "v1.2.1"
        rbac:
          create: true
        clusterScope: false

  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-llm

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
