
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kigawa-net-mc-ftb-mc
  namespace: argocd
spec:
  project: kigawa-net

  source:
    repoURL: https://github.com/kigawa-net/kigawa-net-k8s.git
    targetRevision: main
    path: mc/ftb-mc
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kigawa-net-mc-ftb-mc

  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true