apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-for-argocd
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-for-argocd
  template:
    metadata:
      labels:
        app: mcp-for-argocd
    spec:
      serviceAccountName: oauth2-proxy
      initContainers:
        - name: create-argocd-token
          image: ghcr.io/argoproj/argocd:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              if kubectl get secret argocd-mcp-token -n argocd > /dev/null 2>&1; then
                echo "argocd-mcp-token already exists, skipping"
                exit 0
              fi

              API_TOKEN=$(argocd admin account generate-token --account admin --argocd-namespace argocd)

              if [ -z "$API_TOKEN" ]; then
                echo "ERROR: Failed to generate ArgoCD API token"
                exit 1
              fi

              kubectl create secret generic argocd-mcp-token \
                --from-literal=token="$API_TOKEN" \
                -n argocd

              echo "ArgoCD API token created successfully"
      containers:
        - name: mcp-for-argocd
          image: ghcr.io/argoproj-labs/mcp-for-argocd:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ARGOCD_BASE_URL
              value: https://argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-mcp-token
                  key: token
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
