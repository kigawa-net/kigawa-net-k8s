apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-for-argocd
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-for-argocd
  template:
    metadata:
      labels:
        app: mcp-for-argocd
    spec:
      serviceAccountName: oauth2-proxy
      volumes:
        - name: argocd-token
          emptyDir: {}
      initContainers:
        - name: generate-token
          image: quay.io/argoproj/argocd:v2.11.3
          command:
            - /bin/sh
            - -c
            - |
              set -e
              argocd admin account generate-token admin > /token/value
              echo "Token generated"
          volumeMounts:
            - name: argocd-token
              mountPath: /token
        - name: create-secret
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              if kubectl get secret argocd-mcp-token -n argocd > /dev/null 2>&1; then
                echo "argocd-mcp-token already exists, skipping"
                exit 0
              fi
              kubectl create secret generic argocd-mcp-token \
                --from-literal=token="$(cat /token/value)" \
                -n argocd
              echo "ArgoCD API token secret created"
          volumeMounts:
            - name: argocd-token
              mountPath: /token
      containers:
        - name: mcp-for-argocd
          image: ghcr.io/argoproj-labs/mcp-for-argocd:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: ARGOCD_BASE_URL
              value: https://argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-mcp-token
                  key: token
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
