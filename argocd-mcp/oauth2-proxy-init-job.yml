apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth2-proxy-init
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oauth2-proxy-init
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oauth2-proxy-init
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oauth2-proxy-init
subjects:
  - kind: ServiceAccount
    name: oauth2-proxy-init
    namespace: argocd
---
apiVersion: batch/v1
kind: Job
metadata:
  name: oauth2-proxy-init
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: oauth2-proxy-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              if kubectl get secret oauth2-proxy-secret -n argocd > /dev/null 2>&1; then
                echo "Secret already exists, skipping"
                exit 0
              fi
              client_id=$(kubectl get configmap oauth2-proxy-config -n argocd -o jsonpath='{.data.client-id}')
              client_secret=$(openssl rand -base64 32 | tr -d '\n=')
              cookie_secret=$(openssl rand -base64 32 | tr -d '\n=')
              kubectl create secret generic oauth2-proxy-secret \
                --from-literal=client-id="$client_id" \
                --from-literal=client-secret="$client_secret" \
                --from-literal=cookie-secret="$cookie_secret" \
                -n argocd
              echo "Secret created successfully"
