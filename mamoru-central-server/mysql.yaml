apiVersion: v1
kind: Service
metadata:
  name: mamoru-mysql-headless
  namespace: kigawa-net-mamoru-main
spec:
  clusterIP: None
  selector:
    app: mamoru-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mamoru-mysql
  namespace: kigawa-net-mamoru-main
spec:
  selector:
    app: mamoru-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mamoru-mysql
  namespace: kigawa-net-mamoru-main
  labels:
    app: mamoru-mysql
spec:
  serviceName: mamoru-mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app: mamoru-mysql
  template:
    metadata:
      labels:
        app: mamoru-mysql
    spec:
      initContainers:
        - name: wipe-dirty-datadir
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              # rook-ceph thin provisioning may return blocks from previous volumes.
              # If ibdata1 exists but has zero bytes, the data dir is corrupt → wipe it.
              if [ -f /var/lib/mysql/ibdata1 ] && [ ! -s /var/lib/mysql/ibdata1 ]; then
                echo "Detected zero-byte ibdata1 (dirty block device). Wiping data directory..."
                find /var/lib/mysql -mindepth 1 -delete
                echo "Wipe complete."
              else
                echo "Data directory OK (ibdata1 absent or valid)."
              fi
          volumeMounts:
            - name: mysql-vol
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: mariadb:11.4
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
            - name: MARIADB_DATABASE
              value: mamoru
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-vol
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 180
          livenessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: mysql-vol
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
