apiVersion: v1
kind: Service
metadata:
  name: mamoru-mysql-headless
  namespace: kigawa-net-mamoru-main
spec:
  clusterIP: None
  selector:
    app: mamoru-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mamoru-mysql
  namespace: kigawa-net-mamoru-main
spec:
  selector:
    app: mamoru-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mamoru-mysql
  namespace: kigawa-net-mamoru-main
  labels:
    app: mamoru-mysql
spec:
  serviceName: mamoru-mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app: mamoru-mysql
  template:
    metadata:
      labels:
        app: mamoru-mysql
    spec:
      initContainers:
        - name: mysql-init
          image: mysql:8.4
          command:
            - bash
            - -c
            - |
              set -e
              DATA_DIR=/var/lib/mysql
              MARKER="$DATA_DIR/.mamoru-init-complete"
              SOCK=/tmp/mysql-init.sock

              if [ -f "$MARKER" ]; then
                echo "Init marker present. MySQL already initialized."
                exit 0
              fi

              echo "Wiping data directory for fresh initialization..."
              rm -rf "$DATA_DIR"/* "$DATA_DIR"/.??* 2>/dev/null || true

              echo "Running mysqld --initialize-insecure..."
              mysqld --initialize-insecure --user=mysql --datadir="$DATA_DIR"
              echo "--initialize-insecure complete."

              echo "Starting temporary MySQL (--skip-networking)..."
              mysqld --skip-networking --socket="$SOCK" --user=mysql --datadir="$DATA_DIR" &
              MYSQLD_PID=$!

              echo "Waiting for temporary MySQL to be ready..."
              for i in $(seq 1 240); do
                if mysqladmin ping -u root -S "$SOCK" --connect-timeout=5 2>/dev/null; then
                  echo "Temporary MySQL is ready (attempt $i)."
                  break
                fi
                sleep 5
              done

              echo "Configuring root password, user, and database..."
              mysql -u root -S "$SOCK" -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '${MYSQL_ROOT_PASSWORD}';"
              mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -S "$SOCK" -e "
                CREATE DATABASE IF NOT EXISTS \`mamoru\`;
                CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';
                GRANT ALL ON \`mamoru\`.* TO '${MYSQL_USER}'@'%';
                FLUSH PRIVILEGES;
              "

              echo "Shutting down temporary MySQL..."
              mysqladmin -u root -p"${MYSQL_ROOT_PASSWORD}" -S "$SOCK" shutdown
              wait "$MYSQLD_PID"
              echo "Temporary MySQL stopped."

              touch "$MARKER"
              echo "MySQL initialization complete. Marker written."
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
          volumeMounts:
            - name: mysql-vol
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
            - name: MYSQL_DATABASE
              value: mamoru
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mamoru-db-secret
                  key: pass
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-vol
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
  volumeClaimTemplates:
    - metadata:
        name: mysql-vol
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
