apiVersion: v1
kind: PersistentVolume
metadata:
  name: rook-cephfs-root
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 7Ti
  csi:
    driver: kigawa-system-rook-ceph.cephfs.csi.ceph.com
    nodeStageSecretRef:
      name: rook-csi-cephfs-node
      namespace: kigawa-system-rook-ceph
    volumeAttributes:
      clusterID: kigawa-system-rook-ceph
      fsName: rook-cephfs
      staticVolume: "true"
      rootPath: /
    volumeHandle: rook-cephfs-root-static
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  volumeMode: Filesystem
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rook-cephfs-root
  namespace: kigawa-net-nextcloud
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 7Ti
  storageClassName: ""
  volumeName: rook-cephfs-root
