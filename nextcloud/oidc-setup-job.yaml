apiVersion: batch/v1
kind: Job
metadata:
  name: nextcloud-oidc-setup
  namespace: kigawa-net-nextcloud
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      serviceAccountName: nextcloud-oidc-setup-sa
      restartPolicy: OnFailure
      containers:
        - name: oidc-setup
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e

              # Wait for Nextcloud pod to be ready
              kubectl wait pod \
                -n kigawa-net-nextcloud \
                -l app.kubernetes.io/name=nextcloud \
                --for=condition=Ready \
                --timeout=300s

              POD=$(kubectl get pod \
                -n kigawa-net-nextcloud \
                -l app.kubernetes.io/name=nextcloud \
                -o jsonpath='{.items[0].metadata.name}')

              echo "Running occ on pod: $POD"

              # Install and enable user_oidc
              kubectl exec -n kigawa-net-nextcloud $POD \
                -- php occ app:install user_oidc --no-interaction 2>/dev/null || true
              kubectl exec -n kigawa-net-nextcloud $POD \
                -- php occ app:enable user_oidc

              # Configure Keycloak OIDC provider (idempotent)
              kubectl exec -n kigawa-net-nextcloud $POD \
                -- php occ user_oidc:provider nextcloud \
                  --clientid=nextcloud \
                  --clientsecret="${OIDC_CLIENT_SECRET}" \
                  --discoveryuri=https://user.kigawa.net/realms/private/.well-known/openid-configuration \
                  --unique-uid=0 \
                  --check-bearer=1

              # Keycloak only (disable local login)
              kubectl exec -n kigawa-net-nextcloud $POD \
                -- php occ config:app:set user_oidc allow_multiple_user_backends --value=0

              echo "OIDC setup complete"
          env:
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextcloud-oidc-sec
                  key: client-secret