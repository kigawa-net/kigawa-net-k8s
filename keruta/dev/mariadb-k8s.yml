
apiVersion: v1
kind: Service
metadata:
  name: mariadb-k8s
  labels:
    app: mariadb-k8s
    tier: database
spec:
  ports:
  - port: 3306
    targetPort: 3306
  selector:
    app: mariadb-k8s
    tier: database
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: mariadb-k8s
spec:
  organizationId: "a2b57f3d-6e2b-4467-b499-b31e00bfd804"
  secretName: mariadb-k8s
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: "5860fe81-6d0e-487a-927c-b40000ce3056"
      secretKeyName: root-pass
    - bwSecretId: "335a4ba7-58ee-4e31-bdb5-b40000ce5e15"
      secretKeyName: user
    - bwSecretId: "54f8c7fc-eecf-492b-95a5-b40000ce6bb2"
      secretKeyName: pass
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-k8s
  labels:
    app: mariadb-k8s
spec:
  serviceName: mariadb-k8s-svc
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-k8s
      tier: database
  template:
    metadata:
      labels:
        app: mariadb-k8s
        tier: database
    spec:
      containers:
      - name: mariadb-k8s
        image: mariadb:10.11
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-k8s
              key: root-pass
        - name: MYSQL_DATABASE
          value: ktcl_k8s
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mariadb-k8s
              key: user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-k8s
              key: pass
        volumeMounts:
        - name: mariadb-k8s-data
          mountPath: /var/lib/mysql
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -p${MYSQL_ROOT_PASSWORD}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
            - -u
            - root
            - -p${MYSQL_ROOT_PASSWORD}
          initialDelaySeconds: 5
          periodSeconds: 2
  volumeClaimTemplates:
  - metadata:
      name: mariadb-k8s-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
      storageClassName: rook-ceph-rbd