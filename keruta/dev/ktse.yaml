apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktse
  labels:
    app: ktse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ktse
  template:
    metadata:
      name: ktse
      labels:
        app: ktse
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: ktse
          image: harbor.kigawa.net/library/ktse:develop-00ea22960970808e454b005dc08c36efd1ce6baf
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 64
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: KTSE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  key: private-key
                  name: ktse
            - name: PROVIDER_0_NAME
              value: web
            - name: PROVIDER_0_AUDIENCE
              value: keruta
            - name: PROVIDER_0_ISSUER
              value: https://keruta-dev.kigawa.net
            - name: IDP_0_AUDIENCE
              value: keruta
            - name: IDP_0_ISSUER
              value: https://user.kigawa.net/realms/develop
            - name: DB_JDBC_URL
              value: jdbc:mysql://mariadb-ktse:3306/mariadb-ktse
            - name: DB_USERNAME
              value: mariadb-ktse
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: pass
                  name: mariadb-ktse
            - name: ZK_HOST
              value: zookeeper-ktse:2181
      restartPolicy: Always
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: ktse
spec:
  organizationId: "a2b57f3d-6e2b-4467-b499-b31e00bfd804"
  secretName: ktse
  authToken:
    secretName: bitwarden-sec
    secretKey: token
  map:
    - bwSecretId: "b05e1df6-f056-4193-9c5b-b3fe0113016e"
      secretKeyName: private-key
---
apiVersion: v1
kind: Service
metadata:
  name: ktse
spec:
  selector:
    app: ktse
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
