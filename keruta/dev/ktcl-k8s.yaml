apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktcl-k8s-dev
  namespace: kigawa-net-keruta-dev
  labels:
    app: ktcl-k8s-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ktcl-k8s-dev
  template:
    metadata:
      name: ktcl-k8s-dev
      labels:
        app: ktcl-k8s-dev
    spec:
      serviceAccountName: keruta-dev-sa
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: ktcl-k8s-dev
          image: harbor.kigawa.net/library/ktcl-k8s:develop-174ca69f2b3077746076752566a1466fe841c48a
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: ktse
            - containerPort: 8081
              protocol: TCP
              name: web
          env:
            - name: KTSE_PROVIDER_AUDIENCE
              value: "keruta-k8s"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-k8s
                  key: pass
            - name: DB_USERNAME
              value: ktcl-k8s
            - name: DB_JDBC_URL
              value: "jdbc:mariadb://mariadb-k8s:3306/ktcl_k8s"
            - name: PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  key: private-key
                  name: ktcl-k8s-sec
            - name: IDP_AUDIENCE
              value: "keruta-k8s"
            - name: KERUTA_K8S_OWN_ISSUER
              value: "https://ktcl-k8s-dev.kigawa.net/"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://keruta-dev.kigawa.net,http://localhost:5173"
            - name: KTSE_HOST
              value: ktse-dev-svc
            - name: KTSE_PORT
              value: "8080"
            - name: KTSE_USE_TLS
              value: "false"
            - name: K8S_NAMESPACE
              value: kigawa-net-keruta-dev-sandbox
            - name: K8S_USE_IN_CLUSTER
              value: "true"
            - name: K8S_JOB_TIMEOUT
              value: "600"
            - name: KTCL_K8S_WEB_PORT
              value: "8081"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
