apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm-ingress
  namespace: kigawa-net-llm-proxy
  annotations:
    haproxy.org/timeout-connect: "10s"
    haproxy.org/timeout-server: "300s"
    haproxy.org/timeout-tunnel: "300s"
spec:
  ingressClassName: haproxy
  rules:
    - host: litellm.kigawa.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm-service
                port:
                  number: 80
