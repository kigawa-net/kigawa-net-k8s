apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: maas-postgres
  namespace: kigawa-net-maas
spec:
  serviceName: maas-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: maas-postgres
  template:
    metadata:
      labels:
        app: maas-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:14
          env:
            - name: POSTGRES_DB
              value: maas
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: maas-postgres
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: maas-postgres
                  key: pass
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "maas", "-d", "maas"]
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "maas", "-d", "maas"]
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: rook-ceph-rbd
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: maas-postgres-svc
  namespace: kigawa-net-maas
spec:
  selector:
    app: maas-postgres
  ports:
    - port: 5432
      targetPort: 5432