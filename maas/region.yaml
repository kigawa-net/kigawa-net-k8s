apiVersion: apps/v1
kind: Deployment
metadata:
  name: maas-region
  namespace: kigawa-net-maas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maas-region
  template:
    metadata:
      labels:
        app: maas-region
    spec:
      initContainers:
        # DBが起動するまで待機
        - name: wait-postgres
          image: postgres:14
          command:
            - sh
            - -c
            - |
              until pg_isready -h maas-postgres-svc -U $POSTGRES_USER; do
                echo "Waiting for postgres..."
                sleep 2
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: maas-postgres
                  key: user
      containers:
        - name: maas-region
          image: harbor.kigawa.net/library/maas-region:main-7dc803cf584e68905403c007c88e81a497033fa8
          imagePullPolicy: IfNotPresent
          # systemd実行に必要
          securityContext:
            privileged: true
          volumeMounts:
            - name: cgroup
              mountPath: /sys/fs/cgroup
          env:
            - name: MAAS_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: maas-postgres
                  key: user
            - name: MAAS_POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: maas-postgres
                  key: pass
            - name: MAAS_POSTGRES_HOST
              value: "maas-postgres-svc"
            - name: MAAS_POSTGRES_DB
              value: "maas"
            - name: MAAS_SECRET
              valueFrom:
                secretKeyRef:
                  name: maas-secret
                  key: secret
            # MAAS Region URL (rack controllerが接続するURL)
            - name: MAAS_URL
              value: "http://maas-region-svc.kigawa-net-maas.svc.cluster.local:5240/MAAS"
          ports:
            - containerPort: 5240
              name: api
          startupProbe:
            httpGet:
              path: /MAAS/api/2.0/
              port: 5240
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /MAAS/api/2.0/
              port: 5240
            periodSeconds: 30
      volumes:
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory


