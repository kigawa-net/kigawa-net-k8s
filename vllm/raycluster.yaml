apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: vllm-cluster
  namespace: kigawa-net-llm
spec:
  rayVersion: "2.37.0"
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
      num-gpus: "0"
    template:
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values: ["k8s-worker3"]
        containers:
          - name: ray-head
            image: rayproject/ray:2.37.0-py311
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "4"
                memory: "8Gi"
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
  workerGroupSpecs:
    - groupName: gpu-worker
      replicas: 0
      minReplicas: 0
      maxReplicas: 1
      rayStartParams:
        num-gpus: "1"
      template:
        spec:
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values: ["k8s-worker3"]
          containers:
            - name: ray-worker
              image: vllm/vllm-openai:v0.23.0
              resources:
                requests:
                  nvidia.com/gpu: "1"
                  cpu: "1"
                  memory: "4Gi"
                limits:
                  nvidia.com/gpu: "1"
                  cpu: "4"
                  memory: "16Gi"
              env:
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
              volumeMounts:
                - mountPath: /root/.cache/huggingface
                  name: hf-cache
          volumes:
            - name: hf-cache
              persistentVolumeClaim:
                claimName: hf-cache-pvc
