apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: vllm-cluster
  namespace: kigawa-net-llm
spec:
  rayVersion: "2.37.0"
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "0"
      num-gpus: "0"
    template:
      spec:
        containers:
          - name: ray-head
            image: rayproject/ray:2.37.0-py311
            resources:
              requests:
                cpu: "2"
                memory: "4Gi"
              limits:
                cpu: "4"
                memory: "8Gi"
            ports:
              - containerPort: 6379
                name: gcs
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
  workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 3
      minReplicas: 3
      maxReplicas: 3
      rayStartParams:
        num-gpus: "1"
      template:
        spec:
          containers:
            - name: ray-worker
              image: vllm/vllm-openai:v0.7.2
              resources:
                requests:
                  nvidia.com/gpu: 1
                  cpu: "4"
                  memory: "8Gi"
                limits:
                  nvidia.com/gpu: 1
                  cpu: "8"
                  memory: "16Gi"
              env:
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
          tolerations:
            - key: nvidia.com/gpu
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: ray-worker
                        operator: In
                        values: ["true"]
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      ray.io/group: gpu-workers
                  topologyKey: kubernetes.io/hostname
    - groupName: legacy-gpu-worker
      replicas: 1
      minReplicas: 1
      maxReplicas: 1
      rayStartParams:
        num-gpus: "1"
      template:
        spec:
          containers:
            - name: ray-worker
              image: vllm/vllm-openai:v0.7.2
              resources:
                requests:
                  nvidia.com/gpu: 1
                  cpu: "4"
                  memory: "8Gi"
                limits:
                  nvidia.com/gpu: 1
                  cpu: "12"
                  memory: "20Gi"
              env:
                - name: NCCL_IB_DISABLE
                  value: "1"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
          tolerations:
            - key: nvidia.com/gpu
              operator: "Exists"
              effect: "NoSchedule"
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values: ["k8s-worker3"]
