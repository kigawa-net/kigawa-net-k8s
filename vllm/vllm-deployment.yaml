apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deployment
  namespace: kigawa-net-llm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.7.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec python -m vllm.entrypoints.openai.api_server \
                --model Qwen/Qwen2.5-14B-Instruct-AWQ \
                --served-model-name production-llm \
                --tensor-parallel-size 3 \
                --max-model-len 8192 \
                --gpu-memory-utilization 0.9 \
                --dtype auto \
                --port 8000 \
                --host 0.0.0.0
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm
                  key: api-key
            - name: RAY_ADDRESS
              value: "ray://vllm-cluster-head-svc:10001"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
          volumeMounts:
            - mountPath: /root/.cache/huggingface
              name: hf-cache
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8000
            failureThreshold: 60
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
