apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-deployment
  namespace: kigawa-net-llm
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.23.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model Qwen/Qwen3-4B-AWQ \
                --served-model-name production-llm \
                --quantization awq_marlin \
                --tensor-parallel-size 1 \
                --max-model-len 1024 \
                --gpu-memory-utilization 0.95 \
                --dtype float16 \
                --trust-remote-code \
                --enforce-eager \
                --max-num-seqs 32 \
                --port 8000 \
                --host 0.0.0.0
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vllm
                  key: api-key
            - name: TMPDIR
              value: /vllm-tmp
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "1"
              memory: "4Gi"
              ephemeral-storage: "1Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: "16Gi"
              ephemeral-storage: "10Gi"
          volumeMounts:
            - mountPath: /root/.cache/huggingface
              name: hf-cache
            - mountPath: /vllm-tmp
              name: vllm-tmp
          startupProbe:
            httpGet:
              path: /v1/health
              port: 8000
            failureThreshold: 60
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["k8s-worker3"]
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
        - name: vllm-tmp
          emptyDir:
            sizeLimit: 10Gi
