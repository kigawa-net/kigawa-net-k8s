apiVersion: apps/v1
kind: Deployment
metadata:
  name: lp
  labels:
    app: lp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lp
  template:
    metadata:
      name: lp
      labels:
        app: lp
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: lp
          image: harbor.kigawa.net/private/portfolio:main-391d37235e6c446382c87e0c486f96bb56bfbcc2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: KEYCLOAK_URL
              value: https://user.kigawa.net
            - name: KEYCLOAK_REALM
              value: kigawa-net
            - name: KEYCLOAK_CLIENT_ID
              value: lp
            #            - name: KEYCLOAK_CLIENT_SECRET
            #              value:
            - name: APP_URL
              value: https://kigawa.net
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: lp
                  key: secret
      restartPolicy: Always
---
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: lp
spec:
  organizationId: "a2b57f3d-6e2b-4467-b499-b31e00bfd804"
  secretName: lp
  authToken:
    secretName: bitwarden-sec
    secretKey: token
  map:
    - bwSecretId: "804f048f-ddb0-479c-8cdc-b40b011c44c3"
      secretKeyName: secret
---
apiVersion: v1
kind: Service
metadata:
  name: lp
spec:
  selector:
    app: lp
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
