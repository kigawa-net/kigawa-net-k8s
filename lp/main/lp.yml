apiVersion: apps/v1
kind: Deployment
metadata:
  name: lp
  labels:
    app: lp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lp
  template:
    metadata:
      name: lp
      labels:
        app: lp
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: lp
          image: harbor.kigawa.net/private/portfolio:main-c08f9e74cb575fae4f51b3e8bd9300743e6a4b07
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env: []
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: lp
spec:
  selector:
    app: lp
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
  template:
    spec:
      containers:
        - image: harbor.kigawa.net/private/portfolio:main-c08f9e74cb575fae4f51b3e8bd9300743e6a4b07
