apiVersion: apps/v1
kind: Deployment
metadata:
  name: lp
  labels:
    app: lp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lp
  template:
    metadata:
      name: lp
      labels:
        app: lp
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: lp
          image: harbor.kigawa.net/private/portfolio:main-e7bab865b8401915e327246d4da4794d55800121
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env: []
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: lp
spec:
  selector:
    app: lp
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
  template:
    spec:
      containers:
        - image: harbor.kigawa.net/private/portfolio:main-e7bab865b8401915e327246d4da4794d55800121
